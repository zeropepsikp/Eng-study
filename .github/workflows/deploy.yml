name: Deploy to GitHub Pages

# main에 푸시되면 index.html에 TTS 키(시크릿)를 주입해 Pages로 배포합니다.
# 시크릿(TTS_API_KEY)이 없으면 자리표시자가 그대로 남아 → 앱은 기본(폰) 음성을 사용합니다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site + inject TTS key
        env:
          TTS_API_KEY: ${{ secrets.TTS_API_KEY }}
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          if [ -n "$TTS_API_KEY" ]; then
            python3 - <<'PY'
import os
p = "_site/index.html"
key = os.environ["TTS_API_KEY"]
s = open(p, encoding="utf-8").read()
n = s.count("__TTS_API_KEY__")
s = s.replace("__TTS_API_KEY__", key)
open(p, "w", encoding="utf-8").write(s)
print(f"Injected TTS key into {n} placeholder(s).")
PY
          else
            echo "No TTS_API_KEY secret set — leaving placeholder (app falls back to default voice)."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
